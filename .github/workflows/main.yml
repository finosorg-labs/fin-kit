# =============================================================================
# fin-kit GitHub Actions CI Pipeline
# =============================================================================
#
# All builds run on Linux (ubuntu-24.04) via cross-compilation toolchain.
#
# Build matrix:
#   - Linux native: GCC + Clang, Release + Debug
#   - Windows amd64: cross-compiled via MinGW-w64
#
# Architecture:
#   Stage 1 — Build:  Linux native + Windows cross-compile
#   Stage 2 — QA:    Sanitizer / Coverage / Static analysis
#   Stage 3 — Go:    Go module
# =============================================================================

name: fin-kit CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Stage 1 — Build
  # ==========================================================================

  linux-build:
    name: Linux / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            ${{ matrix.compiler == 'clang' && 'clang' || '' }}

      - name: Configure
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
        run: |
          cmake -B build/linux_amd64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=${{ matrix.build_type == 'Release' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build/linux_amd64 --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/linux_amd64

  windows-cross:
    name: Windows amd64 (cross)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64 cmake make

      - name: Configure
        run: |
          cmake -B build/windows_amd64 \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain/x86_64-w64-mingw32.cmake \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/make \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build/windows_amd64 --parallel

      - name: Verify binary format
        run: |
          echo "=== Windows amd64 artifact ==="
          file build/windows_amd64/lib/*.a 2>/dev/null || echo "(no artifacts)"
          x86_64-w64-mingw32-objdump -f build/windows_amd64/lib/*.a 2>/dev/null | grep "file format" | head -3 || true

  # ==========================================================================
  # Stage 2 — Quality assurance
  # ==========================================================================

  sanitizer:
    name: Sanitizer / ${{ matrix.type }} (Linux)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { type: ASan,  cc: gcc,   sanitizer: address }
          - { type: USan,  cc: gcc,   sanitizer: undefined }
          - { type: TSan,  cc: gcc,   sanitizer: thread }
          - { type: MSan,  cc: clang, sanitizer: memory }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            ${{ matrix.cc == 'clang' && 'clang' || '' }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: |
          cmake -B build/linux_amd64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DFC_ENABLE_SANITIZERS=ON \
            -DFC_SANITIZER_TYPE=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build build/linux_amd64 --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/linux_amd64

  coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc cmake ninja-build lcov

      - name: Configure
        run: |
          cmake -B build/linux_amd64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Coverage \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build/linux_amd64 --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/linux_amd64

      - name: Generate coverage report
        run: |
          lcov --capture --directory build/linux_amd64 --output-file coverage.info --no-external
          lcov --remove coverage.info '*/third_party/*' --output-file coverage.filtered.info
          lcov --list coverage.filtered.info

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.filtered.info
          flags: unittests
          name: fin-kit-coverage
          fail_ci_if_error: false

  clang-tidy:
    name: Static Analysis (Clang-Tidy)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake ninja-build clang-tidy

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build/linux_amd64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build with clang-tidy
        run: cmake --build build/linux_amd64 --parallel --target finkit 2>&1 | tee build.log

      - name: Run clang-tidy
        run: |
          find src -name '*.c' -o -name '*.h' | \
            xargs clang-tidy \
              --quiet \
              --export-fixes=fixes.yaml 2>&1

  cppcheck:
    name: Static Analysis (Cppcheck)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --std=c11 \
            --suppress=missingInclude \
            --quiet \
            -j$(nproc) \
            src/ tests/ benchmarks/ include/

  # ==========================================================================
  # Stage 3 — Go module
  # ==========================================================================

  go-build:
    name: Go Module
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: go/fin-kit/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ==========================================================================
  # Build summary
  # ==========================================================================
  build-summary:
    name: Summary
    needs: [
      linux-build, windows-cross,
      sanitizer, coverage, clang-tidy, cppcheck, go-build
    ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## fin-kit CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | linux-build | ${{ needs.linux-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | windows-cross | ${{ needs.windows-cross.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | sanitizer | ${{ needs.sanitizer.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | clang-tidy | ${{ needs.clang-tidy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | cppcheck | ${{ needs.cppcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go    | go-build | ${{ needs.go-build.result }} |" >> $GITHUB_STEP_SUMMARY
