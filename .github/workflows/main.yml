# =============================================================================
# fin-kit GitHub Actions CI Pipeline
# =============================================================================
# Supports:
#   - Linux (GCC, Clang)
#   - macOS (GCC, Clang)
#   - Windows (MSVC, MinGW)
#   - Sanitizers: ASan, USan, MSan, TSan
#   - Code coverage
# =============================================================================

name: fin-kit CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared build configuration
  BUILD_TYPE: Release
  CMAKE_VERSION: '3.28.1'
  NinjaVersion: 'v1.12.1'

jobs:
  # ==========================================================================
  # Linux builds
  # ==========================================================================
  linux-gcc-release:
    name: Linux / GCC / Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-gcc-debug:
    name: Linux / GCC / Debug
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-clang-release:
    name: Linux / Clang / Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-clang-debug:
    name: Linux / Clang / Debug
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  # ==========================================================================
  # macOS builds
  # ==========================================================================
  macos-gcc-release:
    name: macOS / GCC / Release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  macos-clang-release:
    name: macOS / Clang / Release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  macos-clang-debug:
    name: macOS / Clang / Debug
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  # ==========================================================================
  # Windows builds
  # ==========================================================================
  windows-msvc-release:
    name: Windows / MSVC / Release
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: cmd
        run: |
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -G "Visual Studio 17 2022" ^
            -DFC_BUILD_TESTS=ON ^
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        shell: cmd
        run: cmake --build build --parallel

      - name: Test
        shell: cmd
        run: ctest --output-on-failure --test-dir build

  windows-msvc-debug:
    name: Windows / MSVC / Debug
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: cmd
        run: |
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Debug ^
            -G "Visual Studio 17 2022" ^
            -DFC_BUILD_TESTS=ON ^
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        shell: cmd
        run: cmake --build build --parallel

      - name: Test
        shell: cmd
        run: ctest --output-on-failure --test-dir build

  windows-mingw-release:
    name: Windows / MinGW / Release
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        uses: egor-tensin/setup-mingw@v1

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -G "MinGW Makefiles" \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Test
        shell: bash
        run: ctest --output-on-failure --test-dir build

  # ==========================================================================
  # Sanitizers (AddressSanitizer, UndefinedBehaviorSanitizer, MemorySanitizer)
  # Only runs on Debug build (sanitizers not recommended for Release)
  # ==========================================================================
  linux-asan:
    name: Sanitizer / ASan (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-usan:
    name: Sanitizer / USan (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-tsan:
    name: Sanitizer / TSan (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  linux-msan:
    name: Sanitizer / MSan (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DFC_BUILD_TESTS=ON \
            -DFC_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

  # ==========================================================================
  # Code coverage (only on Linux GCC Release)
  # ==========================================================================
  linux-coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ cmake ninja-build lcov

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage -g -O0" \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage -g -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage" \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --no-external
          lcov --remove coverage.info '*/third_party/*' --output-file coverage.filtered.info
          lcov --list coverage.filtered.info

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.filtered.info
          flags: unittests
          name: fin-kit-coverage
          fail_ci_if_error: false

  # ==========================================================================
  # Go module build
  # ==========================================================================
  go-build:
    name: Go Module
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/fin-kit/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ==========================================================================
  # Static analysis
  # ==========================================================================
  cppcheck:
    name: Static Analysis (Cppcheck)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --std=c11 \
            --suppress=missingInclude \
            --quiet \
            -j$(nproc) \
            src/ tests/ benchmarks/ include/ 2>&1 || true

  # ==========================================================================
  # Build summary
  # ==========================================================================
  build-summary:
    name: Summary
    needs: [
      linux-gcc-release, linux-gcc-debug,
      linux-clang-release, linux-clang-debug,
      macos-gcc-release, macos-clang-release, macos-clang-debug,
      windows-msvc-release, windows-msvc-debug, windows-mingw-release,
      linux-asan, linux-usan, linux-tsan, linux-msan,
      linux-coverage, go-build, cppcheck
    ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## fin-kit CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          jobs=(
            "linux-gcc-release:${{ needs.linux-gcc-release.result }}"
            "linux-gcc-debug:${{ needs.linux-gcc-debug.result }}"
            "linux-clang-release:${{ needs.linux-clang-release.result }}"
            "linux-clang-debug:${{ needs.linux-clang-debug.result }}"
            "macos-gcc-release:${{ needs.macos-gcc-release.result }}"
            "macos-clang-release:${{ needs.macos-clang-release.result }}"
            "macos-clang-debug:${{ needs.macos-clang-debug.result }}"
            "windows-msvc-release:${{ needs.windows-msvc-release.result }}"
            "windows-msvc-debug:${{ needs.windows-msvc-debug.result }}"
            "windows-mingw-release:${{ needs.windows-mingw-release.result }}"
            "linux-asan:${{ needs.linux-asan.result }}"
            "linux-usan:${{ needs.linux-usan.result }}"
            "linux-tsan:${{ needs.linux-tsan.result }}"
            "linux-msan:${{ needs.linux-msan.result }}"
            "linux-coverage:${{ needs.linux-coverage.result }}"
            "go-build:${{ needs.go-build.result }}"
            "cppcheck:${{ needs.cppcheck.result }}"
          )
          for job in "${jobs[@]}"; do
            name="${job%%:*}"
            status="${job##*:}"
            if [ "$status" = "success" ]; then
              emoji="✅"
            elif [ "$status" = "failure" ]; then
              emoji="❌"
            elif [ "$status" = "skipped" ]; then
              emoji="⏭️"
            else
              emoji="⚠️"
            fi
            echo "| $name | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done
