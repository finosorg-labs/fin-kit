# =============================================================================
# fin-kit GitHub Actions CI Pipeline
# =============================================================================
#
# All builds run on Linux (ubuntu-24.04) via cross-compilation toolchain.
# Dependencies are installed per-job via composite action with apt caching.
#
# Build matrix:
#   - Linux native: GCC + Clang, Release
#   - Windows amd64: cross-compiled via MinGW-w64, Release
#
# Output structure (all under build/):
#   build/linux_amd64/{bin,lib}/
#   build/windows_amd64/{bin,lib}/
# Sanitizer/coverage/clang-tidy jobs use their own subtrees:
#   build/sanitizer-asan/, build/coverage/, build/clang-tidy/
#
# Architecture:
#   Stage 1 — Build:  Linux native + Windows cross-compile
#   Stage 2 — QA:     Sanitizer / Coverage / Static analysis
#   Stage 3 — Go:     Go module
# =============================================================================

name: fin-kit CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Stage 1a — Linux native build (Release, GCC + Clang)
  # ==========================================================================

  linux-build:
    name: Linux / ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'

      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
          CMAKE_C_COMPILER_LAUNCHER: ccache
        run: |
          cmake -B build/linux_amd64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build/linux_amd64 --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/linux_amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-${{ matrix.compiler }}
          path: |
            build/linux_amd64/lib/
            build/linux_amd64/bin/
          retention-days: 5

  # ==========================================================================
  # Stage 1b — Windows amd64 cross-compile (Release)
  # ==========================================================================

  windows-cross:
    name: Windows amd64 (cross)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'
          cross-compile: 'true'

      - name: Configure
        run: |
          cmake -B build/windows_amd64 \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/toolchain/x86_64-w64-mingw32.cmake \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/make \
            -DCMAKE_BUILD_TYPE=Release \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build/windows_amd64 --parallel

      - name: Verify binary format
        run: |
          echo "=== Windows amd64 artifact ==="
          echo "bin:"
          find build/windows_amd64/bin -type f 2>/dev/null | head -10 || echo "(empty)"
          echo "lib:"
          find build/windows_amd64/lib -type f 2>/dev/null | head -10 || echo "(empty)"
          file build/windows_amd64/bin/*.exe 2>/dev/null | head -3 || true
          x86_64-w64-mingw32-objdump -f build/windows_amd64/lib/*.a 2>/dev/null \
            | grep "file format" | head -3 || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-mingw
          path: |
            build/windows_amd64/lib/
            build/windows_amd64/bin/
          retention-days: 5

  # ==========================================================================
  # Stage 2a — Sanitizers (ASan / USan / TSan / MSan)
  # ==========================================================================

  sanitizer-asan:
    name: Sanitizer / ASan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'

      - name: Configure
        env:
          CC: gcc
        run: |
          cmake -B build/sanitizer-asan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DFC_ENABLE_SANITIZERS=ON \
            -DFC_SANITIZER_TYPE=address

      - name: Build
        run: cmake --build build/sanitizer-asan --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/sanitizer-asan

  sanitizer-usan:
    name: Sanitizer / USan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'

      - name: Configure
        env:
          CC: gcc
        run: |
          cmake -B build/sanitizer-usan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DFC_ENABLE_SANITIZERS=ON \
            -DFC_SANITIZER_TYPE=undefined

      - name: Build
        run: cmake --build build/sanitizer-usan --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/sanitizer-usan

  sanitizer-tsan:
    name: Sanitizer / TSan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'

      - name: Configure
        env:
          CC: gcc
        run: |
          cmake -B build/sanitizer-tsan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DFC_ENABLE_SANITIZERS=ON \
            -DFC_SANITIZER_TYPE=thread

      - name: Build
        run: cmake --build build/sanitizer-tsan --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/sanitizer-tsan

  sanitizer-msan:
    name: Sanitizer / MSan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'
          qa: 'true'

      - name: Configure
        env:
          CC: clang
        run: |
          cmake -B build/sanitizer-msan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DFC_ENABLE_SANITIZERS=ON \
            -DFC_SANITIZER_TYPE=memory

      - name: Build
        run: cmake --build build/sanitizer-msan --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/sanitizer-msan

  # ==========================================================================
  # Stage 2b — Coverage
  # ==========================================================================

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'
          qa: 'true'

      - name: Configure
        run: |
          cmake -B build/coverage \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Coverage \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build/coverage --parallel

      - name: Test
        run: ctest --output-on-failure --test-dir build/coverage

      - name: Generate coverage report
        run: |
          lcov --capture --directory build/coverage --output-file coverage.info --ignore-errors empty --no-external
          lcov --remove coverage.info '*/third_party/*' --output-file coverage.filtered.info --ignore-errors empty,unused || true
          lcov --list coverage.filtered.info --ignore-errors empty || true

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.filtered.info
          flags: unittests
          name: fin-kit-coverage
          fail_ci_if_error: false

  # ==========================================================================
  # Stage 2c — Static analysis
  # ==========================================================================

  clang-tidy:
    name: Static / Clang-Tidy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'
          qa: 'true'

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build/clang-tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFC_BUILD_TESTS=ON \
            -DFC_BUILD_BENCHMARKS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build with clang-tidy
        run: cmake --build build/clang-tidy --parallel --target finkit 2>&1 | tee build.log

      - name: Run clang-tidy
        run: |
          find src \( -name '*.c' -o -name '*.h' \) \
            ! -name 'platform_macos.c' \
            ! -name 'platform_win.c' | \
            xargs clang-tidy -p build/clang-tidy --quiet 2>&1 || true

  cppcheck:
    name: Static / Cppcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          cppcheck-only: 'true'

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --std=c11 \
            --suppress=missingInclude \
            --quiet \
            -j$(nproc) \
            src/ tests/ benchmarks/ include/

  # ==========================================================================
  # Stage 3 — Go module
  # ==========================================================================

  go-build:
    name: Go Module
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          c-build: 'true'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/fin-kit/go.mod

      - name: Build
        working-directory: go/fin-kit
        env:
          CC: gcc
        run: go build -tags fin_kit_cgo ./...

      - name: Vet
        working-directory: go/fin-kit
        env:
          CC: gcc
        run: go vet -tags fin_kit_cgo ./...

      - name: Test
        working-directory: go/fin-kit
        env:
          CC: gcc
        run: go test -tags fin_kit_cgo ./...

  # ==========================================================================
  # Build summary
  # ==========================================================================
  build-summary:
    name: Summary
    needs: [
      linux-build, windows-cross,
      sanitizer-asan, sanitizer-usan, sanitizer-tsan, sanitizer-msan,
      coverage, clang-tidy, cppcheck, go-build
    ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## fin-kit CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | linux-build | ${{ needs.linux-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | windows-cross | ${{ needs.windows-cross.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | sanitizer-asan | ${{ needs.sanitizer-asan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | sanitizer-usan | ${{ needs.sanitizer-usan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | sanitizer-tsan | ${{ needs.sanitizer-tsan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | sanitizer-msan | ${{ needs.sanitizer-msan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | clang-tidy | ${{ needs.clang-tidy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA    | cppcheck | ${{ needs.cppcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go    | go-build | ${{ needs.go-build.result }} |" >> $GITHUB_STEP_SUMMARY